# NeuralRelay Pipeline Configuration
# Customize stages, models, and settings for your workflow.
#
# To add a custom agent (e.g., security audit), add a stage:
#   - name: security-audit
#     agent: security-agent
#     model_preference: opus
#
# Agents are loaded from the agents/ directory.

pipeline:
  - name: requirements
    agent: ba-agent
    model_preference: sonnet
  - name: implementation
    agent: dev-agent
    model_preference: opus
  - name: testing
    agent: test-agent
    model_preference: sonnet
  - name: review
    agent: review-agent
    model_preference: opus

settings:
  max_rework_cycles: 2
  handoff_validation: strict
  handoff_dir: .neuralrelay/handoffs
  token_tracking: true
